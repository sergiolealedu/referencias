name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify backend artifact
        run: test -f backend/dist/server.js

      - name: Verify frontend artifact
        run: test -f frontend/dist/index.html

  android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npm run build:android

      - name: Build debug APK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: |
          chmod +x frontend/android/gradlew
          npm run android:assemble:debug -- --no-daemon --stacktrace

      - name: Verify Android artifact
        run: test -n "$(find frontend/android/app/build/outputs/apk -name '*.apk' -print -quit)"
