name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify backend artifact
        run: test -f backend/dist/server.js

      - name: Verify frontend artifact
        run: test -f frontend/dist/index.html

  android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npm run build:android

      - name: Build release APK/AAB
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          set -o pipefail
          if ! ./gradlew bundleRelease assembleRelease --no-daemon --stacktrace 2>&1 | tee ../../gradle-android.log; then
            MESSAGE=$(grep -E 'What went wrong:|Execution failed for task|error:' ../../gradle-android.log | head -5 | tr '\n' ' ')
            echo "::error title=Gradle build failed::${MESSAGE:-Ver gradle-android.log}"
            exit 1
          fi

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-android-log
          path: gradle-android.log

      - name: Verify Android artifacts
        run: |
          test -n "$(find frontend/android/app/build/outputs/apk/release -name '*.apk' -print -quit)"
          test -n "$(find frontend/android/app/build/outputs/bundle/release -name '*.aab' -print -quit)"
