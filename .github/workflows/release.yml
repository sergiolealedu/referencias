name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Tag inválida: $GITHUB_REF_NAME (esperado vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@sergiolealedu'

      - name: Align package versions
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version -ws --include-workspace-root

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish backend to GitHub Packages
        run: npm publish -w backend --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish frontend to GitHub Packages
        run: npm publish -w frontend --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release bundle
        run: node scripts/package-release.mjs "${{ steps.version.outputs.version }}"

      - name: Generate release notes
        id: notes
        run: |
          PREVIOUS=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')
          if [ -n "$PREVIOUS" ]; then
            NOTES=$(git log "${PREVIOUS}..HEAD" --pretty=format:'- %s (%h)' --no-merges)
          else
            NOTES=$(git log --pretty=format:'- %s (%h)' --no-merges)
          fi
          {
            echo 'body<<EOF'
            echo "## Referências ${{ steps.version.outputs.version }}"
            echo
            echo "### Pacotes (GitHub Packages)"
            echo
            echo '```'
            echo "npm install @sergiolealedu/referencias-backend@${{ steps.version.outputs.version }}"
            echo "npm install @sergiolealedu/referencias-frontend@${{ steps.version.outputs.version }}"
            echo '```'
            echo
            echo "Configure o registry em \`.npmrc\`:"
            echo
            echo '```'
            echo '@sergiolealedu:registry=https://npm.pkg.github.com'
            echo '//npm.pkg.github.com/:_authToken=SEU_TOKEN'
            echo '```'
            echo
            echo "### Alterações"
            echo
            echo "$NOTES"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Referências v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          files: release/referencias-${{ steps.version.outputs.version }}.zip
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
