name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Tag inválida: $GITHUB_REF_NAME (esperado vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@sergiolealedu'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Android signing secrets
        id: android_signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Align package versions
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version --workspaces --include-workspace-root

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish backend to GitHub Packages
        run: npm publish -w backend --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish frontend to GitHub Packages
        run: npm publish -w frontend --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Android version
        run: node scripts/android-set-version.mjs "${{ steps.version.outputs.version }}"

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: node scripts/android-prepare-signing.mjs

      - name: Sync Capacitor Android project
        run: npm run cap:sync:only -w frontend

      - name: Build Android release
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          set -o pipefail
          if ! ./gradlew bundleRelease assembleRelease --no-daemon --stacktrace 2>&1 | tee ../../gradle-android-release.log; then
            MESSAGE=$(grep -E 'What went wrong:|Execution failed for task|error:' ../../gradle-android-release.log | head -5 | tr '\n' ' ')
            echo "::error title=Gradle build failed::${MESSAGE:-Ver gradle-android-release.log}"
            exit 1
          fi

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-android-release-log
          path: gradle-android-release.log

      - name: Collect Android artifacts
        run: node scripts/android-collect-artifacts.mjs "${{ steps.version.outputs.version }}"

      - name: Create release bundle
        run: node scripts/package-release.mjs "${{ steps.version.outputs.version }}"

      - name: Generate release notes
        id: notes
        env:
          ANDROID_SIGNING_CONFIGURED: ${{ steps.android_signing.outputs.configured }}
        run: |
          PREVIOUS=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')
          if [ -n "$PREVIOUS" ]; then
            NOTES=$(git log "${PREVIOUS}..HEAD" --pretty=format:'- %s (%h)' --no-merges)
          else
            NOTES=$(git log --pretty=format:'- %s (%h)' --no-merges)
          fi
          {
            echo 'body<<EOF'
            echo "## Referências ${{ steps.version.outputs.version }}"
            echo
            echo "### Pacotes (GitHub Packages)"
            echo
            echo '```'
            echo "npm install @sergiolealedu/referencias-backend@${{ steps.version.outputs.version }}"
            echo "npm install @sergiolealedu/referencias-frontend@${{ steps.version.outputs.version }}"
            echo '```'
            echo
            echo "Configure o registry em \`.npmrc\`:"
            echo
            echo '```'
            echo '@sergiolealedu:registry=https://npm.pkg.github.com'
            echo '//npm.pkg.github.com/:_authToken=SEU_TOKEN'
            echo '```'
            echo
            echo "### App Android"
            echo
            echo "- \`referencias-${{ steps.version.outputs.version }}.aab\` — bundle para Google Play"
            echo "- \`referencias-${{ steps.version.outputs.version }}.apk\` — instalação direta (sideload)"
            echo
            if [ "$ANDROID_SIGNING_CONFIGURED" = "true" ]; then
              echo "Build assinado com o keystore de release configurado nos secrets do repositório."
            else
              echo "> Configure os secrets \`ANDROID_KEYSTORE_*\` para gerar builds assinados para produção."
            fi
            echo
            echo "### Alterações"
            echo
            echo "$NOTES"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Referências v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            release/referencias-${{ steps.version.outputs.version }}.zip
            release/referencias-${{ steps.version.outputs.version }}.aab
            release/referencias-${{ steps.version.outputs.version }}.apk
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
